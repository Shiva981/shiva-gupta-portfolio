<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient -->
    <linearGradient id="grad" x1="96" y1="96" x2="416" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main Chip -->
  <g filter="url(#glow)">
    <rect
      x="146"
      y="146"
      width="220"
      height="220"
      rx="28"
      stroke="url(#grad)"
      stroke-width="8"
    />

    <!-- Inner Core -->
    <rect
      x="206"
      y="206"
      width="100"
      height="100"
      rx="16"
      stroke="url(#grad)"
      stroke-width="8"
    />

    <!-- Core Glow -->
    <rect
      x="222"
      y="222"
      width="68"
      height="68"
      rx="10"
      fill="url(#grad)"
      opacity="0.18"
    />

    <!-- Top Pins -->
    <g stroke="url(#grad)" stroke-width="8" stroke-linecap="round">
      <path d="M176 146V112"/>
      <path d="M216 146V112"/>
      <path d="M256 146V112"/>
      <path d="M296 146V112"/>
      <path d="M336 146V112"/>
    </g>

    <!-- Bottom Pins -->
    <g stroke="url(#grad)" stroke-width="8" stroke-linecap="round">
      <path d="M176 366V400"/>
      <path d="M216 366V400"/>
      <path d="M256 366V400"/>
      <path d="M296 366V400"/>
      <path d="M336 366V400"/>
    </g>

    <!-- Left Pins -->
    <g stroke="url(#grad)" stroke-width="8" stroke-linecap="round">
      <path d="M112 176H146"/>
      <path d="M112 216H146"/>
      <path d="M112 256H146"/>
      <path d="M112 296H146"/>
      <path d="M112 336H146"/>
    </g>

    <!-- Right Pins -->
    <g stroke="url(#grad)" stroke-width="8" stroke-linecap="round">
      <path d="M366 176H400"/>
      <path d="M366 216H400"/>
      <path d="M366 256H400"/>
      <path d="M366 296H400"/>
      <path d="M366 336H400"/>
    </g>

    <!-- PCB Traces -->
    <g stroke="url(#grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">

      <!-- Top -->
      <path d="M256 112V76"/>
      <path d="M256 76H320"/>
      <circle cx="340" cy="76" r="6" fill="#A855F7" stroke="none"/>

      <!-- Bottom -->
      <path d="M256 400V436"/>
      <path d="M256 436H192"/>
      <circle cx="172" cy="436" r="6" fill="#60A5FA" stroke="none"/>

      <!-- Left -->
      <path d="M112 256H76"/>
      <path d="M76 256V192"/>
      <circle cx="76" cy="172" r="6" fill="#60A5FA" stroke="none"/>

      <!-- Right -->
      <path d="M400 256H436"/>
      <path d="M436 256V320"/>
      <circle cx="436" cy="340" r="6" fill="#A855F7" stroke="none"/>
    </g>

    <!-- Decorative Tech Dots -->
    <g fill="#C084FC">
      <circle cx="132" cy="92" r="3"/>
      <circle cx="386" cy="120" r="3"/>
      <circle cx="102" cy="380" r="3"/>
      <circle cx="414" cy="396" r="3"/>
    </g>
  </g>
</svg>